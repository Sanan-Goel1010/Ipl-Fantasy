<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>IPL Fantasy League 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a14;color:#f0ece4;font-family:'Barlow Condensed',sans-serif;font-size:16px;min-height:100vh}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#f5a623;border-radius:3px}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 16px;text-align:left;color:#f5a623;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;white-space:nowrap;background:#111120;border-bottom:2px solid #f5a623}
  td{padding:10px 16px;border-bottom:1px solid #1a1a2a}
  tr:hover td{background:#181828}
  .tab-btn{padding:13px 24px;border:none;background:transparent;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:#666;transition:all .2s}
  .tab-btn.active{color:#f5a623;border-bottom:2px solid #f5a623}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
  .green{background:#7bff9e;box-shadow:0 0 6px #7bff9e}.yellow{background:#f5a623;box-shadow:0 0 6px #f5a623}.red{background:#ff4a4a;box-shadow:0 0 6px #ff4a4a}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .sync-bar{background:#0d1a0d;border:1px solid #1a3a1a;border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px}
  .badge{display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;padding:2px 6px;text-transform:uppercase}
  .modal-bg{position:fixed;inset:0;background:#000a;z-index:100;display:flex;align-items:center;justify-content:center}
  .modal{background:#111120;border:2px solid #f5a623;border-radius:12px;padding:28px;max-width:380px;width:90%}
  input{background:#161624;color:#f0ece4;border:1px solid #2a2a3d;border-radius:6px;padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;outline:none;width:100%}
  input:focus{border-color:#f5a623}
  button{cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;border:none;transition:all .15s}
  .btn-gold{background:#f5a623;color:#000;border-radius:6px;padding:9px 18px;font-size:14px;font-weight:700}
  .btn-dark{background:#2a2a3d;color:#aaa;border-radius:6px;padding:9px 18px;font-size:14px}
  #loading{position:fixed;inset:0;background:#0a0a14;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid #1e1e30;border-top:3px solid #f5a623;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>

<div id="loading">

// ── STATE ──────────────────────────────────────────────────────────────────
let DB, stats={}, teamNames={}, renamingId=null;
let lastSync=0;

function calcRaw(p){
  const s=findStats(p.name);
  return s.runs*100+s.wickets*2000+s.catches*250;
}
function calcPts(p){
  const raw=calcRaw(p);
  return p.slot==='C'?raw*2:p.slot==='VC'?raw*1.5:raw;
}
function teamTotal(team){ return team.players.reduce((s,p)=>s+calcPts(p),0); }
function fmt(n){ return Math.round(n).toLocaleString(); }
function medal(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`; }
function rankColor(i){ return i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#cd7f32':'#aaa'; }

// ── NAME MATCHING ──────────────────────────────────────────────────────────
function matchName(apiName){
  const an=apiName.toLowerCase().trim();
  // Check aliases
  for(const [canonical,aliases] of Object.entries(ALIASES)){
    if(aliases.some(a=>an===a||an.includes(a)||a.includes(an))) return canonical;
  }
  // Fuzzy: last name match
  const parts=an.split(' ');
  const last=parts[parts.length-1];
  for(const [canonical] of Object.entries(ALIASES)){
    if(canonical.endsWith(last)) return canonical;
  }
  return an;
}

function findStats(playerName){
  const pn=playerName.toLowerCase();
  // Direct lookup
  if(stats[pn]) return stats[pn];
  // Check aliases
  const aliases=ALIASES[pn]||[];
  for(const a of aliases){
    if(stats[a]) return stats[a];
  }
  // Reverse: check if any stats key matches this player
  for(const [key,val] of Object.entries(stats)){
    const kn=matchName(key);
    if(kn===pn) return val;
    // try aliases of this player
    if(aliases.some(a=>key===a||key.includes(a.split(' ').pop()))) return val;
  }
  return {runs:0,wickets:0,catches:0};
}

// ── FIREBASE BOOT ──────────────────────────────────────────────────────────
async function boot(){
  try{
    const app=initializeApp({databaseURL:DB_URL},'ipl');
    DB=getDatabase(app);
    // Load cached stats and team names
    onValue(ref(DB,'stats'),s=>{ stats=s.val()||{}; render(); });
    onValue(ref(DB,'teamNames'),s=>{ teamNames=s.val()||{}; render(); });
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    // Load last sync time but DON'T auto-sync — user must click Refresh
    const metaSnap=await get(ref(DB,'lastSync'));
    const ls=metaSnap.val()||0;
    if(ls){ setStatus('green','Last synced: '+new Date(ls).toLocaleTimeString()+' · Click ↻ REFRESH to update'); }
    else{ setStatus('yellow','Click ↻ REFRESH to load IPL 2026 stats'); }
  }catch(e){ console.error(e); document.getElementById('syncStatus').textContent='Firebase error: '+e.message; }
}

// ── SYNC ──────────────────────────────────────────────────────────────────
function setStatus(color,text){
  ['syncDot'].forEach(id=>{ const el=document.getElementById(id); if(el)el.className='dot '+color; });
  const s=document.getElementById('syncStatus'); if(s)s.textContent=text;
}

window.doSync=async function(force=true){
  setStatus('yellow','Checking for new IPL 2026 matches…');
  try{
    // Step 1: Get match list (1 API hit)
    const si=await fetch(`https://api.cricapi.com/v1/series_info?id=${IPL_2026_ID}&apikey=${API_KEY}`);
    const sid=await si.json();
    if(sid.status==='failure') throw new Error(sid.reason||'API limit reached — try again later');
    const completed=(sid.data?.matchList||[]).filter(m=>m.matchEnded===true);
    if(!completed.length){ setStatus('yellow','No completed IPL 2026 matches yet'); return; }

    // Step 2: Load already-processed match IDs from Firebase (free, no API hit)
    const processedSnap=await get(ref(DB,'processedMatches'));
    const processed=processedSnap.val()||{};

    // Step 3: Only fetch NEW matches not yet processed
    const newMatches=completed.filter(m=>!processed[m.id]);
    if(!newMatches.length){
      setStatus('green',`✅ Already up to date · ${completed.length} matches cached · ${new Date().toLocaleTimeString()}`);
      return;
    }

    setStatus('yellow',`${newMatches.length} new match(es) found · fetching scorecards… (${newMatches.length*10+1} API hits)`);

    // Step 4: Load existing cached stats from Firebase
    const existingSnap=await get(ref(DB,'stats'));
    const aggRuns={}, aggWkts={}, aggCatch={};
    // Seed from existing cache
    const existing=existingSnap.val()||{};
    for(const [k,v] of Object.entries(existing)){
      aggRuns[k]=v.runs||0;
      aggWkts[k]=v.wickets||0;
      aggCatch[k]=v.catches||0;
    }

    // Step 5: Fetch ONLY new match scorecards
    const newProcessed={...processed};
    for(let i=0;i<newMatches.length;i++){
      const m=newMatches[i];
      setStatus('yellow',`New match ${i+1}/${newMatches.length}: ${m.name?.split(',')[0]||'Match'}…`);
      try{
        await new Promise(r=>setTimeout(r,400));
        const sr=await fetch(`https://api.cricapi.com/v1/match_scorecard?id=${m.id}&apikey=${API_KEY}`);
        const sd=await sr.json();
        if(sd.status==='failure') throw new Error(sd.reason);
        for(const inn of (sd.data?.scorecard||[])){
          for(const bat of (inn.batting||[])){
            const n=(bat.batsman?.name||bat.name||'').toLowerCase(); if(!n) continue;
            const mc=matchName(n);
            aggRuns[mc]=(aggRuns[mc]||0)+(parseInt(bat.r)||0);
            const dis=bat['dismissal-text']||bat.dismissal||'';
            const cm=dis.match(/^c\s+(.+?)\s+b\s+/i);
            if(cm){
              const cat=matchName(cm[1].trim().toLowerCase());
              aggCatch[cat]=(aggCatch[cat]||0)+1;
            }
          }
          for(const bowl of (inn.bowling||[])){
            const n=(bowl.bowler?.name||bowl.name||'').toLowerCase(); if(!n) continue;
            const mc=matchName(n);
            aggWkts[mc]=(aggWkts[mc]||0)+(parseInt(bowl.w)||0);
          }
        }
        // Mark this match as processed
        newProcessed[m.id]=true;
      }catch(e){ console.warn('Scorecard error:',e.message); }
    }

    // Step 6: Save merged stats + processed match IDs to Firebase
    const mergedStats={};
    const allKeys=[...new Set([...Object.keys(aggRuns),...Object.keys(aggWkts),...Object.keys(aggCatch)])];
    for(const c of allKeys){
      mergedStats[c]={runs:aggRuns[c]||0,wickets:aggWkts[c]||0,catches:aggCatch[c]||0};
    }

    await set(ref(DB,'stats'),mergedStats);
    await set(ref(DB,'processedMatches'),newProcessed);
    await set(ref(DB,'lastSync'),Date.now());
    lastSync=Date.now();
    setStatus('green',`✅ ${newMatches.length} new match(es) synced · ${completed.length} total cached · ${new Date().toLocaleTimeString()}`);
  }catch(e){
    console.error(e);
    setStatus('red','❌ '+e.message);
  }
};

// ── TABS ──────────────────────────────────────────────────────────────────
window.switchTab=function(idx,btn){
  document.getElementById('tab0').style.display=idx===0?'block':'none';
  document.getElementById('tab1').style.display=idx===1?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
};

// ── RENAME ────────────────────────────────────────────────────────────────
window.openRename=function(teamId){
  renamingId=teamId;
  const cur=teamNames[teamId]||TEAMS_DEF.find(t=>t.id===teamId)?.name||'';
  document.getElementById('renameInput').value=cur;
  document.getElementById('renameModal').style.display='flex';
  setTimeout(()=>document.getElementById('renameInput').focus(),100);
};
window.closeRename=function(){ document.getElementById('renameModal').style.display='none'; renamingId=null; };
window.confirmRename=function(){
  if(!renamingId) return;
  const val=document.getElementById('renameInput').value.trim();
  if(!val) return;
  update(ref(DB,'teamNames'),{[renamingId]:val});
  closeRename();
};

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  renderTeams();
  renderPlayers();
}

function renderTeams(){
  const el=document.getElementById('teamBoard');
  const sorted=[...TEAMS_DEF].sort((a,b)=>teamTotal(b)-teamTotal(a));

  el.innerHTML=sorted.map((t,i)=>{
    const name=teamNames[t.id]||t.name;
    const total=teamTotal(t);
    const leader=sorted[0];
    const border=i===0?'#f5a623':i===1?'#555':i===2?'#5a3a1a':'#2a2a3d';
    const shadow=i===0?'box-shadow:0 0 24px #f5a62330':'';

    const roster=t.players.map(p=>{
      const s=findStats(p.name);
      const pts=calcPts(p);
      const slotBadge=p.slot==='C'?`<span class="badge" style="background:#FFD700;color:#000;margin-left:4px">C</span>`:
                      p.slot==='VC'?`<span class="badge" style="background:#b0b0b0;color:#000;margin-left:4px">VC</span>`:'';
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #181828;flex-wrap:wrap">
        <div style="flex:1;min-width:120px;font-weight:600;color:#f0ece4">${p.name}${slotBadge}<span style="font-size:12px;color:#555;margin-left:6px">${p.ipl}</span></div>
        <div style="display:flex;gap:16px;font-size:13px;color:#888">
          <span>🏏 <b style="color:#7ec8e3">${s.runs}</b></span>
          <span>🎯 <b style="color:#ff7b7b">${s.wickets}</b></span>
          <span>🤲 <b style="color:#7bff9e">${s.catches}</b></span>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:#f5a623;min-width:70px;text-align:right">${fmt(pts)}</div>
      </div>`;
    }).join('');

    return `<div style="background:#111120;border:1px solid ${border};border-radius:12px;padding:20px;margin-bottom:14px;${shadow}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;color:${rankColor(i)};min-width:44px">${medal(i)}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:#f0ece4;letter-spacing:2px;line-height:1">${name}</div>
            <button onclick="openRename('${t.id}')" style="background:#1e1e30;border:1px solid #333;color:#888;border-radius:5px;padding:3px 10px;font-size:12px">✏️ Rename</button>
          </div>
          <div style="font-size:13px;color:#666;margin-top:2px">👤 ${t.owner}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:38px;color:#f5a623;line-height:1">${fmt(total)}</div>
          <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px">Fantasy Points</div>
          ${i===0?'<div style="color:#f5a623;font-size:12px;font-weight:700;margin-top:2px">👑 LEADER</div>':''}
          ${i>0?`<div style="color:#444;font-size:12px;margin-top:2px">-${fmt(teamTotal(leader)-total)} from 1st</div>`:''}
        </div>
      </div>
      <div style="border-top:1px solid #1e1e30;padding-top:10px">${roster}</div>
    </div>`;
  }).join('');
}

function renderPlayers(){
  // Collect all players with their fantasy team
  const allPlayers=[];
  TEAMS_DEF.forEach(t=>{
    const tname=teamNames[t.id]||t.name;
    t.players.forEach(p=>{
      const s=findStats(p.name);
      const raw=s.runs*100+s.wickets*2000+s.catches*250;
      allPlayers.push({...p,...s,raw,fantasyTeam:tname,owner:t.owner});
    });
  });
  allPlayers.sort((a,b)=>b.raw-a.raw);

  const rc=i=>i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#cd7f32':'#555';
  document.getElementById('playerBoard').innerHTML=allPlayers.length===0
    ?`<tr><td colspan="8" style="text-align:center;padding:40px;color:#444">Loading…</td></tr>`
    :allPlayers.map((p,i)=>`<tr>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:${rc(i)}">${medal(i)}</td>
      <td style="font-weight:700;color:#f0ece4">${p.name}${p.slot==='C'?` <span class="badge" style="background:#FFD700;color:#000">C</span>`:p.slot==='VC'?` <span class="badge" style="background:#b0b0b0;color:#000">VC</span>`:''}</td>
      <td style="font-size:13px;color:#888">${p.fantasyTeam}</td>
      <td><span class="badge" style="background:#1a1a2e;color:#aaa">${p.ipl}</span></td>
      <td style="color:#7ec8e3;font-weight:700">${p.runs}</td>
      <td style="color:#ff7b7b;font-weight:700">${p.wickets}</td>
      <td style="color:#7bff9e;font-weight:700">${p.catches}</td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:#f5a623">${fmt(p.raw)}</td>
    </tr>`).join('');
}

boot();
</script>
